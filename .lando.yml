name: d9
recipe: drupal9
config:
  webroot: web
  php: 7.4
  via: apache:2.4
  database: mysql:5.7
tooling:
  node:
    service: node
  yarn:
    service: node
  npx:
    service: node
  gulp:
    service: node
    cmd: npx gulp
proxy:
  phpmyadmin:
    - pma.lndo.site
  mailhog:
    - mailhog.lndo.site
services:
  appserver:
    build:
      - composer install
    build_as_root:
      - pecl install uploadprogress
      - docker-php-ext-enable uploadprogress
  phpmyadmin:
    type: phpmyadmin
    hosts:
      - database
  mailhog:
    type: mailhog
    hogfrom:
      - appserver
  node:
    type: node:16.13.0
